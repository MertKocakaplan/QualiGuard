[pytest]
# Yol verilmeden `pytest` calistirildiginda yalnizca kendi test paketimiz toplanir.
# Aksi halde `repos/` altindaki analiz icin klonlanmis 3. parti projelerin
# test dosyalari (~15k) da toplanir; bazilari import aninda argparse calistirip
# pytest'i INTERNALERROR ile dusurur.
testpaths = tests

# Acik yol verilse bile (ornegin `pytest .`) bu dizinlere hic girilmez.
norecursedirs =
    repos
    output
    models
    venv
    .venv
    archive
    docs
    node_modules
    .git
    __pycache__
    build
    dist
    *.egg-info
    .*
